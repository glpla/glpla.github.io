<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>video: Ice Age</title>
  <style>
    .video-box {
      width: 640px;
      height: 360px;
      margin: 100px auto 0;
    }

    video {
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="video-box">
    <video id='my-video' src="video/effect.mp4" loop controls preload poster="imgs/ice age.jfif"></video>
  </div>
  <script type="text/javascript">
    let video = document.getElementById("my-video");
    let last = 0;
    video.ontimeupdate = function () {
      let current = video.currentTime;
      console.log(current);
      if (current - last > 2) {
        video.currentTime = last;
      } else {
        last = current;
      }
    };
  </script>
</body>

</html>
