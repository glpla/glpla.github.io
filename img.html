<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>image effect</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/img.css">
</head>

<body>
  <div class="w">
    <h2 class="flex-h">&nbsp; 基本使用&nbsp; </h2>
    <div class="flex-h">
      <div class="img-box">
        <img class="img0" src="./imgs/bg.jpg" alt="">
      </div>
      <div class="img-box">
        <img class="img1" src="./imgs/bg.jpg" alt="">
      </div>
      <div class="img-box">
        <img class="img2" src="./imgs/bg.jpg" alt="">
      </div>
    </div>
    <h2 class="flex-h">&nbsp; 精灵图&nbsp; </h2>
    <p>(background-position)</p>
    <div class="flex-h">
      <div class="flex-h item">
        <p class="icon more">多</p>
        <p>客户服务</p>
      </div>
      <div class="flex-h item">
        <p class="icon fast">块</p>
        <p>客户服务</p>
      </div>
      <div class="flex-h item">
        <p class="icon good">好</p>
        <p>客户服务</p>
      </div>
      <div class="flex-h item">
        <p class="icon save">省</p>
        <p>客户服务</p>
      </div>
    </div>
    <h2 class="flex-h">&nbsp; 高级使用&nbsp; </h2>
    <p>(background-blend-mode)</p>
    <div class="blend-img"></div>
  </div>
</body>

</html>
