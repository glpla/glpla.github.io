<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>image effect</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    h3 {
      text-align: center;
      text-transform: capitalize;
      line-height: 3rem;
    }

    .wrap {
      width: 96vw;
      max-width: 800px;
      margin: 1rem auto 0;
    }

    .blend-img {
      width: 96vw;
      max-width: 600px;
      height: 40vh;
      max-height: 600px;
      margin: 0 auto;
      background: url(imgs/bg.jpg), url(imgs/mask.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center center;
      background-blend-mode: screen;
    }

    .box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item {
      display: flex;
      align-items: center;
      line-height: 3rem;
    }

    .icon {
      width: 36px;
      height: 46px;
      overflow: hidden;
      background-image: url(imgs/jd.png);
      background-repeat: no-repeat;
      text-indent: -999px;
      margin-right: 1rem;
    }

    .more {
      background-position: 0 -191px;
    }

    .fast {
      background-position: -41px -191px;
    }

    .good {
      background-position: -82px -191px;
    }

    .save {
      background-position: -123px -191px;
    }

    @media (max-width:768px) {
      .box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <h3>background-blend-mode</h3>
  <div class="wrap">
    <div class="blend-img"></div>
  </div>
  <h3>精灵图</h3>
  <div class="wrap box">
    <div class="item">
      <p class="icon more">多</p>
      <p>客户服务</p>
    </div>
    <div class="item">
      <p class="icon fast">块</p>
      <p>客户服务</p>
    </div>
    <div class="item">
      <p class="icon good">好</p>
      <p>客户服务</p>
    </div>
    <div class="item">
      <p class="icon save">省</p>
      <p>客户服务</p>
    </div>
  </div>
</body>

</html>
