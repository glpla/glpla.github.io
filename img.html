<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>image effect</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <!-- <link rel="stylesheet" href="css/reset.css"> -->
  <style>
    h3 {
      display: flex;
      align-items: center;
      text-transform: capitalize;
      margin: 0;
    }

    h3::before,
    h3::after {
      content: '';
      flex: 1;
      height: 2px;
      margin: 0 1rem;
      background-color: #ddd;
    }

    p {
      text-align: center;
      margin: 0;
    }

    .wrap {
      width: 96vw;
      max-width: 750px;
      margin: 1rem auto;
      overflow: hidden;
    }

    .img-wrap {
      display: flex;
    }

    .img-box {
      width: 250px;
      height: 250px;
      margin: 1rem auto;
      background-color: #ddd;
      overflow: hidden;
    }

    .img0 {
      width: 100%;
    }

    .img1 {
      width: 100%;
      height: 100%;
    }

    .img2 {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .blend-img {
      width: 750px;
      height: 500px;
      margin: 0 auto;
      background: url(imgs/bg.jpg), url(imgs/mask.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center center;
      background-blend-mode: screen;
    }

    .box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item {
      display: flex;
      align-items: center;
      line-height: 3rem;
    }

    .icon {
      width: 36px;
      height: 46px;
      overflow: hidden;
      background-image: url(imgs/jd.png);
      background-repeat: no-repeat;
      text-indent: -999px;
      margin-right: 1rem;
    }

    .more {
      background-position: 0 -191px;
    }

    .fast {
      background-position: -41px -191px;
    }

    .good {
      background-position: -82px -191px;
    }

    .save {
      background-position: -123px -191px;
    }

    @media (max-width:768px) {

      .img-wrap,
      .box {
        flex-direction: column;
      }

      .blend-img {
        width: 350px;
        height: 235px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h3>基本使用</h3>
    <div class="img-wrap">
      <div class="img-box">
        <img class="img0" src="./imgs/bg.jpg" alt="">
      </div>
      <div class="img-box">
        <img class="img1" src="./imgs/bg.jpg" alt="">
      </div>
      <div class="img-box">
        <img class="img2" src="./imgs/bg.jpg" alt="">
      </div>
    </div>
    <h3>精灵图</h3>
    <p>(background-position)</p>
    <div class="box">
      <div class="item">
        <p class="icon more">多</p>
        <p>客户服务</p>
      </div>
      <div class="item">
        <p class="icon fast">块</p>
        <p>客户服务</p>
      </div>
      <div class="item">
        <p class="icon good">好</p>
        <p>客户服务</p>
      </div>
      <div class="item">
        <p class="icon save">省</p>
        <p>客户服务</p>
      </div>
    </div>
    <h3>特效</h3>
    <p>(background-blend-mode)</p>
    <div class="blend-img"></div>
  </div>
</body>

</html>
