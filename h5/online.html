<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D - Transform</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
        }

        ul {
            width: 100vw;
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        li {
            width: 100%;
            height: 100vh;
            color: #fff;
            letter-spacing: 4px;
            font-size: 2rem;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            background-blend-mode: multiply;
            background-size: cover;
        }

        ul li:nth-child(1) {
            background-color: #90f;
            background-image: url(../imgs/jiageng/jg0.jpg);
        }

        ul li:nth-child(2) {
            background-color: #078;
            background-image: url(../imgs/jiageng/jg1.jpg);
        }

        ul li:nth-child(3) {
            background-color: #780;
            background-image: url(../imgs/jiageng/jg2.jpg);
        }

        ul li:nth-child(4) {
            background-color: #90f;
            background-image: url(../imgs/jiageng/jg3.jpg);
        }

        ul li:nth-child(5) {
            background-color: #fcc;
            background-image: url(../imgs/jiageng/jg4.jpg);
        }
    </style>
</head>

<body>
    <div class="container">
        <ul>
            <li>item1</li>
            <li>item2</li>
            <li>item3</li>
            <li>item4</li>
            <li>item5</li>
        </ul>
    </div>
</body>

</html>
