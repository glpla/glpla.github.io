<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sky-box {
            width: 200px;
            height: 200px;
            margin: 100px auto;
            perspective: 1000px;
            border: 1px solid #666;
            padding: 10px;
        }

        .sky-box:hover .box {
            transform: rotateY(180deg);
        }

        .box {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: .5s;
        }

        .box::before,
        .box::after {
            content: '';
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .box::before {
            background-color: #f40;
        }

        .box::after {
            background-color: #078;
            transform: rotateY(180deg);
            backface-visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="sky-box">
        <div class="box"></div>
    </div>
</body>

</html>
