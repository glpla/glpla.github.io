<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sky-box {
            width: 300px;
            height: 400px;
            margin: 100px auto;
            border: 10px solid #999;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: 1s;
        }

        .sky-box:hover .card {
            transform: rotateY(180deg);
        }

        .card::before,
        .card::after {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
        }

        .card::before {
            content: 'front';
            background-color: #f40;
        }

        .card::after {
            content: 'back';
            background-color: #078;
            transform: rotateY(180deg);
        }
    </style>
</head>

<body>
    <div class="sky-box">
        <div class="card"></div>
    </div>
</body>

</html>
