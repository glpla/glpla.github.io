<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/jquery-3.6.0.min.js"></script>
    <script src="../js/jquery.magnific-popup.min.js"></script>
    <link href="../js/magnific-popup.min.css" rel="stylesheet">
    <style>
        .parent-container {
            width: 400px;
            height: 300px;
            margin: 100px auto;
            border: 1px solid #f40;
        }

        a {
            display: block;
            width: 400px;
            height: 300px;
        }
    </style>
</head>

<body>
    <div class="parent-container">
        <a href="../imgs/course/week1.jpg">Open popup 1</a>
        <a href="../imgs/course/week2.jpg">Open popup 2</a>
        <a href="../imgs/course/week3.jpg">Open popup 3</a>
    </div>
    <script>
        $(document).ready(function () {
            $('.parent-container').magnificPopup({
                delegate: 'a',
                type: 'image'
            });
        });

    </script>
</body>

</html>
