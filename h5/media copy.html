<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>media</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    header {
      line-height: 2.5rem;
      border-bottom: 2px solid #16a085;
      /* box-shadow: 0 2px 4px rgba(0, 0, 0, .4); */
    }

    .navbar {
      display: flex;
      align-items: center;
      padding: 0 .5rem;
    }

    .logo {
      margin-right: auto;
    }

    .menu {
      display: none;
    }

    .menu-item {
      display: block;
      height: 40px;
      padding: 0 10px;
      text-transform: uppercase;
    }

    .menu-item:hover {
      color: #16a085;
    }

    .burgur {
      position: relative;
      width: 30px;
      height: 4px;
      background-color: #16a085;
    }

    .burgur::after,
    .burgur::before {
      content: '';
      position: absolute;
      left: 0;
      top: -8px;
      width: 100%;
      height: 100%;
      background-color: inherit;
    }

    .burgur::after {
      top: unset;
      bottom: -8px;
    }

    .cont {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }

    .cont-item {
      background-color: #f40;
      min-height: 10rem;
    }

    @media screen and (min-width:768px) {
      .cont {
        grid-template-columns: repeat(2, 1fr);
      }

      .menu {
        display: none;
      }
    }

    @media screen and (min-width:992px) {
      .cont {
        grid-template-columns: repeat(3, 1fr);
      }

      .burgur {
        display: none;
      }

      .menu {
        display: flex;
      }

    }

    @media screen and (min-width:1200px) {
      .cont {
        grid-template-columns: repeat(4, 1fr);
      }

    }
  </style>
</head>

<body>
  <div class="w">
    <header>
      <nav class="navbar">
        <a href="#" class="logo">LOGO</a>
        <ul class="menu">
          <li><a class="menu-item" href="#">home</a></li>
          <li><a class="menu-item" href="#">product</a></li>
          <li><a class="menu-item" href="#">download</a></li>
          <li><a class="menu-item" href="#">document</a></li>
          <li><a class="menu-item" href="#">contact</a></li>
        </ul>
        <div class="burgur"></div>
      </nav>
    </header>
    <section>
      <div class="cont">
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
        <div class="cont-item"></div>
      </div>
    </section>
  </div>
</body>

</html>
