<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box model</title>
  <style>
    .box {
      width: 400px;
      height: 600px;
      margin: 10px auto;
      border: 4px solid #ff9f43;
      background-color: #8888;
    }
  </style>
</head>

<body>
  <div class="box">
    <p>宽：width</p>
    <p>高：height</p>
    <p>填充：padding</p>
    <p>边距：margin，唯一一个和别人有关的属性</p>
    <p>显示：display</p>
    <p>定位：position</p>
    <p>字体：color、font。。。</p>
    <p>行距：line-height</p>
    <p>背景：background</p>
    <p>边框：border</p>
    <p>对齐：text-align</p>
    <p>阴影：text-shadow、box-shadow</p>
    <p>伪元素：before、after</p>
    <p>动态：hover、checked、target</p>
  </div>

</body>

</html>
