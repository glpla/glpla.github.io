<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box model</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <style>
    h1 {
      font-size: 1.2rem;
      text-align: center;
    }

    .box {
      width: 640px;
      height: 320px;
      margin: 1rem auto;
      border: 4px solid #ff9f43;
      background-color: #8888;
    }

    p {
      margin: 0;
      width: 640px;
      margin: 1rem auto;
    }

    .label {
      display: inline-block;
      width: 3em;
      text-align-last: justify;
    }

    @media screen and (max-width:768px) {
      html {
        font-size: 14px;
      }

      .box {
        width: 300px;
        height: 170px;
      }

      p {
        width: 300px;
      }
    }
  </style>
</head>

<body>
  <h1>盒模型</h1>
  <div class="box"></div>
  <p><span class="label">宽度</span>：width</p>
  <p><span class="label">高度</span>：height</p>
  <p><span class="label">填充</span>：padding</p>
  <p><span class="label">边距</span>：margin，唯一一个和别人有关的属性</p>
  <p><span class="label">显示</span>：display</p>
  <p><span class="label">定位</span>：position</p>
  <p><span class="label">字体</span>：color、font。。。</p>
  <p><span class="label">行距</span>：line-height</p>
  <p><span class="label">背景</span>：background</p>
  <p><span class="label">边框</span>：border</p>
  <p><span class="label">对齐</span>：text-align</p>
  <p><span class="label">阴影</span>：text-shadow、box-shadow</p>
  <p><span class="label">伪元素</span>：::before、::after</p>
  <p><span class="label">动态</span>：:hover、:checked、:target</p>
</body>

</html>
