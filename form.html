<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name='keywords' content="web glpla">
  <meta name='description' content="only for test">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="//at.alicdn.com/t/font_2357817_edjlnghbgnk.css">
  <title>Form</title>
  <style>
    .w {
      width: 90vw;
      max-width: 1000px;
      margin: 0 auto;
    }

    .spacer {
      display: flex;
      align-items: center;
    }

    .spacer::before {
      content: '';
      width: 10px;
      height: 10px;
      margin-right: 1rem;
      background-color: #a52a2a;
    }

    .spacer::after {
      content: '';
      flex: 1;
      height: 2px;
      margin-left: 1rem;
      background-color: rgba(136, 136, 136, 0.533);
    }

    .search-box {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search {
      display: flex;
      justify-content: center;
      background-color: #333;
      border-radius: 3rem;
      padding: .4rem;
    }

    .search-ipt {
      width: 0;
      height: 3rem;
      background: none;
      transition: .4s;
      color: #a52a2a;
      font-size: 1.4rem;
    }

    .search-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: none;
      color: #a52a2a;
      cursor: pointer;
    }

    .search-btn span {
      font-size: 1.5rem;
    }

    .search-ipt:focus,
    .search:hover .search-ipt {
      width: 12rem;
      padding-left: .4rem;
    }

    .wrap {
      position: relative;
      max-width: 400px;
      margin: 1rem auto;
      padding: 2rem;
      background-color: #2c3e50;
      border-radius: 1rem;
    }

    .wrap::after,
    .wrap::before {
      content: '';
      position: absolute;
      left: -2px;
      top: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 1rem;
      background-image: linear-gradient(235deg, #a52a2a, #c56cf0, #fff200);
    }

    .wrap::before {
      filter: blur(1rem);
      z-index: -2;
    }

    .wrap::after {
      z-index: -1;
    }

    h2 {
      margin-bottom: 2.5rem;
      text-align: center;
      color: #fff;
      text-transform: uppercase;
    }

    .input-box {
      position: relative;
      margin-bottom: 1.6rem;
      color: #079;
    }

    .user,
    .pw {
      width: 100%;
      letter-spacing: 2px;
      border-bottom: 1px solid #079;
      background: transparent;
      color: #079;
      font-size: 1rem;
    }

    .input-box span {
      position: absolute;
      left: 0px;
      top: 0px;
      color: #079;
      font-size: 1rem;
      pointer-events: none;
      transition: 0.4s;
    }

    .input-box input:focus+span,
    .input-box input:valid+span {
      /* font-size: 0.6rem; */
      color: #fff;
      top: -1.4rem;
    }

    /* border的颜色默认和color的颜色保持一致 */
    .btn {
      color: #079;
      background: transparent;
      border: 1px solid #079;
      border-radius: 4px;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: .4s;
    }

    .btn:hover {
      color: #fff;
      background: #079;
    }

    .rem-cb {
      appearance: none;
      display: inline-block;
      vertical-align: middle;
      position: relative;
      width: 40px;
      height: 26px;
      border: 1px solid #f3f4f5;
      border-radius: 15px;
    }

    .rem-cb::before {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: #f3f4f5;
      transition: .4s;
    }

    .rem-cb:checked {
      border-color: #079;
    }

    .rem-cb:checked::before {
      left: 16px;
      background-color: #079;
    }

    .btn {
      width: 100%;
    }

    @media (max-width:768px) {
      html {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="w">
    <div class="spacer">基本理论</div>
    <div class="spacer">案例一</div>
    <div class="search-box">
      <div class="search">
        <input class="search-ipt" type="text" maxlength="12" placeholder="keywords here">
        <button class="search-btn"><span class="iconfont iconsearch1"></span></button>
      </div>
    </div>
    <div class="spacer">案例二</div>
    <div class="wrap">
      <h2>用户登陆</h2>
      <div class="input-box">
        <input class="user" type="text" required>
        <span>用户</span>
      </div>
      <div class="input-box">
        <input class="pw" type="password" required>
        <span>密码</span>
      </div>
      <div class="input-box">
        <input class="rem-cb" type="checkbox" name="" id="cb">
        <label for="cb">记住用户名(QQ无效)</label>
      </div>
      <button class="btn">提交</button>
    </div>
  </div>
  <script>
    window.onload = function () {
      let rem = document.querySelector('.rem-cb')
      let user = document.querySelector('.user')
      user.value = localStorage.getItem('login-name') || ''
      rem.checked = user.value
      // rem.addEventListener('click', () => {
      //   if (!user.value) {
      //     alert('user-name NULL')
      //     rem.checked = false
      //   } else {
      //     rem.checked ? localStorage.setItem('login-name', user.value) : localStorage.removeItem('login-name')
      //   }
      // })
    }
  </script>
</body>

</html>
