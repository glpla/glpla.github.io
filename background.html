<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>demo| 2021.03.31</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="//at.alicdn.com/t/font_2357817_73yjugwbqjc.css">
  <style>
    .cont {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .cont a {
      width: 300px;
      height: 400px;
      padding: 1rem;
      background-color: #fff;
    }

    .ad {
      background-image:
        radial-gradient(35rem circle at -10% 15%, transparent 60%, #f405 0),
        radial-gradient(30rem circle at 10% 25%, transparent 60%, #f409 0),
        radial-gradient(30rem circle at 20% 25%, transparent 60%, #f40 0);
    }

    .cont .item {
      transition: .4s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .cont>a:hover {
      box-shadow: 0 0 10px #ccc;
    }

    .price-box {
      display: flex;
      justify-content: space-around;
      border: 1px solid #e1251b;
      line-height: 2rem;
      background-image: linear-gradient(135deg, #e1231b 50%, transparent 0);
    }

    .new {
      font-weight: 400;
      color: #fff;
      font-size: 120%;
    }

    .old {
      text-decoration: line-through;
      color: #888;
    }

    .center {
      overflow: hidden;
      position: relative;
      background-image: radial-gradient(35rem circle at 50% 90%, #e1251b 50%, #fff 0);
      display: flex;
      flex-direction: column;
    }

    .center::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(35rem circle at 50% 25%, transparent 50%, #e1251b 0);
      filter: drop-shadow(0 0 1rem #666);
    }

    .center h3 {
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .center .center-cont {
      position: relative;
      flex: 1;
      border-bottom: 2px dotted #e1251b;
      background-color: #f6f6f6;
    }

    .center .center-cont::before,
    .center .center-cont::after {
      content: '';
      position: absolute;
      bottom: -0.5rem;
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background-color: #e1251b;
      z-index: 1;
    }

    .center .center-cont::before {
      left: -0.5rem;
    }

    .center .center-cont::after {
      right: -0.5rem;
    }

    @media screen and (max-width:768px) {
      .w {
        width: 90vw;
      }

      .cont {
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="cont w">
    <a class="ad"></a>
    <a class="item">
      <img src="imgs/blue.jpg" alt="">
      <p>这款低帮运动鞋采用经典GG帆布材质，搭配标志性配色组合。设计中融合了多种品牌经典元素，让人联想到品牌与运动和休闲世界的紧密联系。
      </p>
      <div class="price-box">
        <div class="new">&yen;640</div>
        <div class="old">&yen;988</div>
      </div>
    </a>
    <a class="center">
      <h3>领券中心</h3>
      <div class="center-cont"></div>
      <div class="center-cont"></div>
      <div class="center-cont"></div>
    </a>
  </div>
</body>

</html>
