<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>background</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="//at.alicdn.com/t/font_2357817_73yjugwbqjc.css">
  <style>
    h1 {
      text-align: center;
      font-size: 1.5rem;
    }

    .cont {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      justify-items: center;
    }

    .cont a {
      width: 300px;
      height: 400px;
      padding: 1rem;
      background-color: rgb(255, 255, 255);
    }

    .ad {
      background-image:
        radial-gradient(35rem circle at -10% 15%, transparent 60%, rgba(255, 68, 0, 0.333) 0),
        radial-gradient(30rem circle at 10% 25%, transparent 60%, rgba(255, 68, 0, 0.6) 0),
        radial-gradient(30rem circle at 20% 25%, transparent 60%, rgb(255, 68, 0) 0);
    }

    .item {
      transition: .4s;
      display: flex;
      flex-direction: column;
      /* justify-content: space-between; */
    }

    .img {
      display: block;
      height: 50%;
    }

    .intro {
      text-indent: 2em;
      margin-top: 1rem;
      flex: 1;
      /* flex-grow: 1; */
    }

    .cont>a:hover {
      box-shadow: 0 0 10px rgb(204, 204, 204);
    }

    .price-box {
      display: flex;
      justify-content: space-around;
      border: 1px solid rgb(225, 37, 27);
      line-height: 2rem;
      background-image: linear-gradient(135deg, rgb(225, 35, 27) 50%, transparent 0);
    }

    .new {
      font-weight: 400;
      color: rgb(255, 255, 255);
      font-size: 120%;
    }

    .old {
      text-decoration: line-through;
      color: rgb(136, 136, 136);
    }

    .center {
      overflow: hidden;
      position: relative;
      background-image: radial-gradient(37rem circle at 50% 90%, rgb(225, 37, 27) 50%, #fff 0);
      display: flex;
      flex-direction: column;
    }

    .center::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(35rem circle at 50% 25%, transparent 50%, rgb(225, 37, 27) 0);
      filter: drop-shadow(0 0 1rem rgb(102, 102, 102));
    }

    .center h3 {
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .center .center-cont {
      position: relative;
      flex: 1;
      border-bottom: 2px dotted rgb(225, 37, 27);
      background-color: rgb(246, 246, 246);
    }

    .center .center-cont::before,
    .center .center-cont::after {
      content: '';
      position: absolute;
      bottom: -0.5rem;
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background-color: rgb(225, 37, 27);
      z-index: 1;
    }

    .center .center-cont::before {
      left: -0.5rem;
    }

    .center .center-cont::after {
      right: -0.5rem;
    }

    .border {
      border: 1rem rgb(0, 136, 153) dashed;
      padding: 1rem;
      background-image: linear-gradient(to top right, rgb(255, 68, 0) 25%, rgb(238, 238, 238) 0, rgb(238, 238, 238) 50%, rgb(255, 68, 0) 0, rgb(255, 68, 0) 75%, rgb(238, 238, 238) 0);
      background-size: 1rem 1rem;
    }

    .padding-clip {
      background-clip: padding-box;
    }

    .content-clip {
      background-clip: content-box;
    }

    .trans {
      border-color: rgba(0, 136, 153, 0.4);
    }

    .inner-border {
      background-image: linear-gradient(to top right, #f40 25%, #eee 0, #eee 50%, #f40 0, #f40 75%, #eee 0);
      background-size: 1rem 1rem;
    }

    .inner-border .inner {
      height: 100%;
      background-color: #fff;
      border: 1rem solid rgba(255, 255, 0, 0.6);
      background-clip: padding-box;
    }

    .glass-box {
      position: relative;
      height: 100%;
      background-image: linear-gradient(to top right, rgb(66, 185, 167), rgb(70, 172, 185));
      /* 确保堆叠层级 */
      z-index: 0;
    }

    .glass {
      width: 60%;
      height: 100%;
      background-image: linear-gradient(to bottom right, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.1));
      border-radius: 2rem;
      backdrop-filter: blur(1rem);
    }

    .glass-box .img {
      position: absolute;
      left: 40%;
      top: 40%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      /* 必须 */
      z-index: -1;
    }

    @media screen and (max-width:768px) {
      html {
        font-size: 14px;
      }

      .w {
        width: 90vw;
      }

      .cont {
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>

<body>
  <h1>背景图片background-image</h1>
  <div class="cont w">
    <a class="ad"></a>
    <a class="item">
      <img class="img" src="imgs/blue.jpg" alt="">
      <p class="intro">这款低帮运动鞋采用经典GG帆布材质，搭配标志性配色组合。设计中融合了多种品牌经典元素，让人联想到品牌与运动和休闲世界的紧密联系。
      </p>
      <div class="price-box">
        <div class="new">&yen;640</div>
        <div class="old">&yen;988</div>
      </div>
    </a>
    <a class="center">
      <h3>领券中心</h3>
      <div class="center-cont"></div>
      <div class="center-cont"></div>
      <div class="center-cont"></div>
    </a>
  </div>
  <h1>背景裁剪background-clip</h1>
  <div class="cont w">
    <a href="" class="border">border-clip；default</a>
    <a href="" class="border padding-clip">padding-clip</a>
    <a href="" class="border content-clip">content-clip</a>
  </div>
  <h1>背景特效</h1>
  <div class="cont w">
    <a href="" class="border trans">透明边框</a>
    <a href="" class="inner-border">
      <div class="inner">12</div>
    </a>
    <a href="" class="glass-box">
      <div class="glass">毛玻璃</div>
      <img class="img" src="./imgs/lg.jpg" alt="">
    </a>
  </div>
</body>

</html>
