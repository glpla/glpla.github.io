<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glass</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    body {
      min-height: 100vh;
      background-image: linear-gradient(to top right, #42b9a7, #46acb9);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 60vw;
      height: 60vh;
      text-align: center;
      background-image: linear-gradient(to bottom right, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.1));
      border-radius: 2rem;
      backdrop-filter: blur(1rem);
      font-size: 2rem;
    }

    .circle {
      position: absolute;
      width: 6rem;
      height: 6rem;
      border-radius: 50%;
      background-image: linear-gradient(to top right, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.7));
      z-index: -1;
    }

    .c1 {
      right: 17vw;
      top: 17vh;
    }

    .c2 {
      left: 16vw;
      bottom: 18vh;
    }

    .c3 {
      right: 14vw;
      top: 30vh;
    }

    @media (max-width:768px) {
      html {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="box">backdrop-filter: blur(1rem);</div>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <img src="./imgs/book.jpg" class="circle c3" alt="">
</body>

</html>
