<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glass</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    body {
      min-height: 100vh;
      height: 100vh;
      background-image: linear-gradient(to top right, #42b9a7, #46acb9);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrap {
      position: relative;
      width: 60%;
      min-width: 300px;
      max-width: 800px;
      height: 60%;
      text-align: center;
    }

    .box {
      width: 100%;
      height: 100%;
      background-image: linear-gradient(to bottom right, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.1));
      border-radius: 2rem;
      backdrop-filter: blur(1rem);
      font-size: 1.2rem;
    }

    .circle {
      position: absolute;
      width: 6rem;
      height: 6rem;
      border-radius: 50%;
      background-image: linear-gradient(to top right, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.7));
      z-index: -1;
    }

    .c1 {
      right: -8%;
      top: -8%;
    }

    .c2 {
      left: -6%;
      bottom: -6%;
    }

    .c3 {
      right: -10%;
      top: 25%;
    }

    @media (max-width:768px) {
      html {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="box">
      <span>backdrop-filter: blur(1rem);</span>
    </div>
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <img src="./imgs/chrome.jpg" class="circle c3" alt="">
  </div>
</body>

</html>
