<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <!-- <link rel="stylesheet" href="css/reset.css"> -->
  <style>
    .img-box {
      position: relative;
      height: 600px;
      margin: 50px auto;
    }

    .img-box::before,
    .img-box::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-image: url(./imgs/bg.jpg);
      background-size: cover;
    }

    .img-box::before {
      filter: grayscale(100%);
    }

    .img-box::after {
      clip-path: inset(0 0 0 calc(var(--slider)*1%));
    }

    .slider {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      margin: 0;
      cursor: ew-resize;
      z-index: 99;
    }

    /* custom */
    .custom {
      width: 100%;
      height: 20px;
      appearance: none;
      outline: none;
      background: none;
      margin: 0;
      /* overflow: hidden; */
      /* border: none; */
    }

    /* 定义slider的样式 */
    .custom::-webkit-slider-thumb {
      position: relative;
      width: 20px;
      height: 20px;
      background-color: #f40;
      appearance: none;
      outline: none;
      border-radius: 50%;
      /* transition: .2s; */
    }

    .custom::-webkit-slider-thumb::before,
    .custom::-webkit-slider-thumb::after {
      content: '';
      position: absolute;
      top: 0px;
      /* 长度很长没关系，因为刚刚有用 overflow:hidden 了 */
      width: 2000px;
      height: 20px;
      /* 让鼠标可以点击穿透伪元素，不然会点不到下面 */
      pointer-events: none;
      /* transition: .2s; */
    }

    .custom::-webkit-slider-thumb::before {
      left: -1997px;
      background: #f22;
    }

    .custom::-webkit-slider-thumb::after {
      left: 10px;
      background: #edc;
    }

    /* .custom::-webkit-slider-runnable-track {
      border-radius: 8px;
      background: #edc;
      height: 16px;
    } */
  </style>
</head>

<body>
  <div class="w">
    <h4 class="cont-title">默认样式</h4>
    <section>
      <input type="range" min='1' max="100">
    </section>
    <h4 class="cont-title">自定义样式</h4>
    <section>
      <input type="range" min='1' max="100" class="custom">
    </section>
    <section class="img-box" style="--slider:50">
      <input type="range" class="slider" min="1" max="100" value="50" id='slider'>
      <!-- oninput="this.parentNode.style.setProperty('--slider',`${this.value}`)" -->
    </section>
  </div>
  <script>
    window.onload = function () {
      let slider = document.querySelector('#slider')
      slider.addEventListener('input', function () {
        console.log(this.value);
        this.parentNode.style.setProperty('--slider', this.value)
      })
    }
  </script>
</body>

</html>
