<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dom</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    .img-box {
      text-align: center;
      height: 270px;
      line-height: 270px;
      background-size: cover;
    }

    .img-box img {
      margin: 0.2rem;
      width: 80px;
      height: 45px;
      object-fit: cover;
      cursor: pointer;
      border: 4px solid #fff;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <div class="w">
    <h4 class="cont-title">选择元素</h4>
    <section>
      <pre class="code">
      document.querySelector(el)
      document.querySelectorAll(el)</pre>
    </section>
    <h4 class="cont-title">设置类</h4>
    <section>
      <pre class="code">
      dom.style.className=name</pre>
    </section>
    <h4 class="cont-title">设置样式</h4>
    <section>
      <pre class="code">
      dom.style.name=value</pre>
    </section>
    <h4 class="cont-title">修改属性</h4>
    <section>
      <pre class="code">
      dom.style.setProperty(name, value)</pre>
    </section>
    <h4 class="exam-title">换肤</h4>
    <section>
      <div class="img-box">
        <img src="imgs/1.jpg" alt="">
        <img src="imgs/2.jpg" alt="">
        <img src="imgs/3.jpg" alt="">
        <img src="imgs/4.jpg" alt="">
      </div>
    </section>
    <small>Copyright Reserved &copy; By Cnplaman 2021-12-03</small>
  </div>
  <script>
    window.onload = function () {
      let imgBox = document.querySelector('.img-box')
      let imgs = imgBox.querySelectorAll('img')
      for (let i = 0; i < imgs.length; i++) {
        imgs[i].addEventListener('click', function () {
          imgBox.style.backgroundImage = `url(${this.src})`
        })
      }
    }
  </script>
</body>

</html>
