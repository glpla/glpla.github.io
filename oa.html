<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OA Quiz</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/oa.css">
  <link rel="stylesheet" href="./js/magnific-popup.min.css">
  <script src="./js/vue.global.prod.min.js"></script>
</head>

<body>
  <div class="w" id="app">
    <header>
      <h1>
        <a class="logo" href="./oa.html" title="理工学院软件工程">理工学院软件工程</a>
      </h1>
      <span class="logo-txt">大学计算机</span>
      <div class="tips-box">
        <a href="#score-popup" id='score-link'>
          <span class="iconfont tips-icon">&#xe65a;</span>
        </a>
        <a href="#tips-popup" id='tips-link'>
          <span class="iconfont tips-icon">&#xe64a;</span>
        </a>
        <audio id='music' ref='bgm' src="./music/Bandari-New Morning.mp3" preload loop></audio>
        <span id='bgm' @click='onBgm'>
          <span v-if='bgmBool' class="iconfont tips-icon">&#xe674;</span>
          <span v-else class="iconfont tips-icon">&#xe627;</span>
        </span>
      </div>
      <div id="tips-popup" class="tips-popup mfp-hide">
        <p class="tips-title">提示</p>
        <div class="tips-cont">仅供测试练习</div>
        <a href="javascript:;" id='tips-close-link'>关闭</a>
      </div>
      <div id="score-popup" class="tips-popup mfp-hide">
        <p class="tips-title">历史成绩-仅保留上次成绩</p>
        <div v-if='score.length>0'>
          <div class="tips-cont">
            <span>章节</span>
            <span>总题数</span>
            <span>正确数</span>
            <span>正确率</span>
          </div>
          <div v-for='(item,ind) in score' :key='ind'>
            <div class="tips-cont" v-if='item'>
              <span>{{ind+1}}</span><span>{{item.len}}</span><span>{{item.ok}}</span><span>{{(item.ok*100/item.len).toFixed(0)}}%</span>
            </div>
          </div>
        </div>
        <div v-else class="tips-cont">记录为空</div>
        <a href="javascript:;" id='score-close-link'>关闭</a>
        <!-- <a href="javascript:;" id='score-clear-link' class="tips-clr" v-if='score.length>0'>清除记录</a> -->
      </div>
    </header>
    <div class="grid">
      <button class="chap flex-v" v-for='(item,ind) in title' :key='item' @click='sel' :data-ind='ind'
        :disabled='startBool' :class='chapInd==ind? "active":""'>
        <p class="chap-tips">- 第{{ind+1}}章 -</p>
        <p class="chap-tips">{{item}}</p>
      </button>
    </div>
    <section class="timer">
      <button class="btn" v-if='!startBool' @click='startBtn' :disabled='chapInd<0'>开始</button>
      <button class="btn" v-else @click='submitBtn' :disabled="submitBool">
        <span v-if='timeBool'>提交</span>
        <span v-else>
          <span ref='h0'>0</span><span ref='h1'>0</span>:<span ref='m0'>0</span><span ref='m1'>0</span>:<span
            ref='s0'>0</span><span ref='s1'>5</span>
        </span>
      </button>
    </section>
    <form class="quiz" v-if='len'>
      <div class="quiz-item" v-for='(item,ind) in quiz' :hidden='!startBool && !doneBool'>
        <p class="desc">{{ind+1}}-{{quiz.length}}. {{item.desc}}</p>
        <label v-for='(option,sn) in item.options' class="option">
          <div class="sn">
            <input type="radio" :name="'r'+ind" :value='option' :disabled='!startBool' :key="option"
              @change='change(ind,$event)'>
          </div>
          <div :class='(doneBool && option==item.answer)?"flag":""'>{{label[sn]}}&nbsp;&nbsp;{{option}}</div>
        </label>
      </div>
    </form>
    <a class="back flex-v" ref='back' href="#app" :class='{"show":showBool}'>
      <span class="iconfont">&#xe6c0;</span>
    </a>
  </div>
  <small>Copyright Reserved &copy; By Cnplaman 2021-10-06</small>
  <script src="./js/jquery-3.6.0.min.js"></script>
  <script src="./js/jquery.magnific-popup.min.js"></script>
  <script type="module">
    import oa from './data2021/oa.js'
    import './js/smooth-scroll.polyfills.min.js'
    const app = Vue.createApp({
      data() {
        return {
          title: oa.title,
          oa: oa.quiz,
          chapInd: -1,
          startBool: false,
          bgmBool: false,
          submitBool: true,
          doneBool: false,
          timeBool: false,
          showBool: false,
          quiz: [],
          label: ['A', 'B', 'C', 'D'],
          score: [],
          curScore: []
        }
      },
      methods: {
        onBgm() {
          if (this.bgmBool) {
            this.bgmBool = false
            this.$refs.bgm.pause()
          } else {
            this.bgmBool = true
            this.$refs.bgm.play()
          }
        },
        sel(e) {
          let chapInd = Number(e.target.dataset.ind)
          if (chapInd == this.chapInd) {
            return
          }
          let keys = 'chap' + (chapInd + 1)
          this.chapInd = chapInd
          this.doneBool = false
          // do not arr1=arr2;
          let quizbak = [...this.oa[keys]]
          let temp = [...this.rand(quizbak)]
          for (let i = 0; i < temp.length; i++) {
            temp[i].options = [...this.rand(temp[i].options)]
            this.curScore.push(0)
          }
          this.quiz = [...temp]
        },
        change(ind, e) {
          console.log(ind, e.target.value);
          this.curScore[ind] = e.target.value
        },
        startBtn() {
          this.startBool = true
          this.submitBool = true
          this.doneBool = false
          this.timeBool = false
          this.counting()
        },
        submitBtn() {
          this.doneBool = true
          this.startBool = false
          // update curScore
          let grade = 0
          this.quiz.forEach((ele, ind) => {
            if (ele.answer === this.curScore[ind]) {
              grade++
            }
          });
          // show the grade

          // update localStorage score
          let score = this.score
          console.log('before', score);
          let item = new Object()
          console.log(item);
          item.ok = grade
          item.len = this.quiz.length
          score[Number(this.chapInd)] = item
          console.log('after', score);
          this.score = score
          window.localStorage.setItem('score', JSON.stringify(this.score))
        },
        rand(arr) {
          let temp = []
          while (arr.length > 0) {
            let ind = Math.floor(Math.random() * arr.length)
            temp.push(arr[ind])
            arr.splice(ind, 1)
          }
          return temp
        },
        counting() {
          let secs = 2 * 1
          let inter = setInterval(() => {
            secs--;
            if (secs < 0) {
              clearInterval(inter)
              this.timeBool = true
              this.submitBool = false
              return
            }
            let hour = Math.floor(secs / 3600)
            let min = Math.floor(secs % 3600 / 60)
            let sec = secs % 60
            this.$refs.h0.innerHTML = Math.floor(hour / 10)
            this.$refs.h1.innerHTML = hour % 10

            this.$refs.m0.innerHTML = Math.floor(min / 10)
            this.$refs.m1.innerHTML = min % 10

            this.$refs.s0.innerHTML = Math.floor(sec / 10)
            this.$refs.s1.innerHTML = sec % 10
          }, 1000)
        },
        back2top() { }
      },
      computed: {
        res() {
          return (options, option) => {
            return this.label[options.indexOf(option)]
          }
        },
        len() {
          return this.quiz.length
        }
      },
      watch: {
        bool(oldval, newval) {
          console.log(oldval, newval);
        }
      },
      created() {
        // window.localStorage.clear()
        let score = window.localStorage.getItem('score')
        this.score = JSON.parse(score) ? JSON.parse(score) : []
        // popup
        $(document).ready(function () {
          let magnificPopup = $.magnificPopup.instance;
          $('#tips-link').magnificPopup({
            type: 'inline',
            // Allow opening popup on middle mouse click. Always set it to true if you don't provide alternative source in href.
            midClick: true,
            modal: true
          });
          $('#tips-close-link').click(function () {
            magnificPopup.close();
          })
          $('#score-link').magnificPopup({
            type: 'inline',
            // Allow opening popup on middle mouse click. Always set it to true if you don't provide alternative source in href.
            midClick: true,
            modal: true
          });
          $('#score-close-link').click(function () {
            magnificPopup.close();
          })
          $('#score-clear-link').click(function () {
            window.localStorage.clear();
            magnificPopup.close();
          })
        })

      },
      mounted() {
        window.addEventListener('scroll', (e) => {
          // console.log(e);
          // console.log('e.target.scrollingElement.scrollTop', e.target.scrollingElement.scrollTop);
          // console.log('e.srcElement.scrollingElement.scrollTop', e.srcElement.scrollingElement.scrollTop);
          // console.log('document', document.documentElement.scrollTop || document.body.scrollTop);
          // IE8-请使用上述方法；其它浏览器推荐使用如下属性。注意是只读属性
          // console.log('window.pageYOffset', window.pageYOffset);
          // console.log('window', window.innerHeight);
          if (window.pageYOffset > window.innerHeight) {
            // console.log(this.$refs.back);
            // this.$refs.back.classList.add('show')
            this.showBool = true
          } else {
            this.showBool = false
          }
          // console.log(this.$refs.back.classList);
        })
        new SmoothScroll('a[href*="#"]', {
          speed: 300,
          easing: 'easeInCubic'
        })
      },
    })
    const vm = app.mount('#app')
  </script>
</body>

</html>
