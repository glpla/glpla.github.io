<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skin</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <style>
    body {
      height: 100vh;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }

    .target-box {
      position: relative;
      display: flex;
      justify-content: center;
      align-content: center;
      flex-wrap: wrap;
    }

    a {
      position: relative;
      width: 4rem;
      height: 2.6rem;
      text-align: center;
      line-height: 2.2rem;
      margin: .2rem;
      border: .2rem solid rgb(255, 255, 255);
      color: rgb(255, 255, 255);
      transition: .4s;
      z-index: 1;
    }

    a:hover {
      transform: scale(1.04);
    }

    .yellow {
      background-color: #daa520;
    }

    .red {
      background-color: #f40;
    }

    .green {
      background-color: #097;
    }

    .blue {
      background-color: #079;
    }

    .box {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      transition: .6s;
    }

    #yellow:target {
      background-color: #daa520;
    }

    #red:target {
      background-color: #f40;
    }

    #green:target {
      background-color: #097;
    }

    #blue:target {
      background-color: #079;
    }

    /* js-box */
    .js-box {
      display: flex;
      justify-content: center;
      align-content: center;
      flex-wrap: wrap;
      background-repeat: no-repeat;
      background-size: cover;
      transition: .4s;
    }

    .js-box img {
      width: 100px;
      height: 60px;
      object-fit: cover;
      margin: .2rem;
      border: 4px solid #fff;
      transition: .4s;
      cursor: pointer;
    }

    .js-box img:hover {
      transform: scale(1.04);
    }

    @media (max-width:768px) {
      body {
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="target-box">
    <a class="yellow" href="#yellow">黄</a>
    <a class="red" href="#red">红</a>
    <a class="green" href="#green">绿</a>
    <a class="blue" href="#blue">蓝</a>
    <div class="box" id="yellow"></div>
    <div class="box" id="red"></div>
    <div class="box" id="green"></div>
    <div class="box" id="blue"></div>
  </div>
  <div class="js-box">
    <img src="imgs/1.jpg" alt="">
    <img src="imgs/2.jpg" alt="">
    <img src="imgs/3.jpg" alt="">
    <img src="imgs/4.jpg" alt="">
    <img src="imgs/5.jpg" alt="">
    <img src="imgs/6.jpg" alt="">
    <img src="imgs/7.jpg" alt="">
    <img src="imgs/8.jpg" alt="">
    <img src="imgs/9.jpg" alt="">
  </div>
  <script>
    let js_box = document.querySelector('.js-box')
    let imgs = js_box.querySelectorAll('img')
    js_box.style.backgroundImage = `url(${imgs[0].src})`
    for (let i = 0; i < imgs.length; i++) {
      imgs[i].onclick = function () {
        js_box.style.backgroundImage = `url(${this.src})`
      }
    }
  </script>
</body>

</html>
