<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <style>
        body {
            height: 100vh;
            background-color: #eb2c58;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background-color: #fff;
            border: 20px solid #fff;
            box-shadow: 0 0 20px #666 inset;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock::after {
            content: '';
            width: 10px;
            height: 10px;
            position: absolute;
            background-color: #f40;
            border-radius: 50%;
            z-index: 99;
        }

        .num {
            position: absolute;
            height: 100%;
            display: flex;
            justify-content: center;
            transform: rotateZ(calc(var(--num) * -6deg));
        }

        .num::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 10px;
            background-color: #666;
        }

        .num:nth-child(5n+1)::after {
            width: 2px;
            height: 20px;
        }

        .num:nth-child(15n+1)::after {
            width: 6px;
            height: 20px;
        }

        .hour,
        .min,
        .sec {
            position: absolute;
            display: flex;
            justify-content: center;
        }

        .hour {
            width: 50%;
            height: 50%;
        }

        .min {
            width: 70%;
            height: 70%;
        }

        .sec {
            width: 90%;
            height: 90%;
        }

        .hour::before {
            content: '';
            width: 4px;
            height: 60%;
            background-color: #333;
        }

        .min::before {
            content: '';
            width: 2px;
            height: 60%;
            background: #666;
        }

        .sec::before {
            content: '';
            width: 1px;
            height: 60%;
            background: #f40;
        }
    </style>
</head>

<body>

    <script>
        window.onload = function () {
            let date, h, m, s;
            let oHour = document.querySelector('.hour')
            let oMin = document.querySelector('.min')
            let oSec = document.querySelector('.sec')
            function getTime() {
                date = new Date()
                h = date.getHours()
                m = date.getMinutes()
                s = date.getSeconds()
                oHour.style.transform = `rotateZ(${(h % 12) * 360 / 12}deg)`
                oMin.style.transform = `rotateZ(${(m % 60) * 360 / 60}deg)`
                oSec.style.transform = `rotateZ(${s * 6}deg)`

            }
            getTime()
            let tId = setInterval(getTime, 1000)
        }
    </script>
