<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//at.alicdn.com/t/font_2666679_7k0jvv91lwu.css">
  <title>breath light</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <style>
    body {
      background-color: #f3f4f5;
    }

    .title {
      text-align: center;
    }

    .breath {
      margin: 60px auto 0;
      display: flex;
      justify-content: center;
    }

    .item {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .desc {
      position: absolute;
      bottom: 50%;
      text-align: center;
      font-size: 24px;
      z-index: -1;
      margin-top: 1rem;
      opacity: 0;
      transition: .4s;
    }

    .icon {
      font-size: 24px;
      color: #f40;
    }

    .item img {
      width: 180px;
      height: 320px;
      object-fit: cover;
      margin: 20px;
      border: 5px solid #fff;
      overflow: hidden;
      transition: all ease 0.4s;
    }

    .item:hover img {
      transform: scale(1.06);
      border-radius: 20px;
      box-shadow: 2px 2px 5px 5px rgba(0, 0, 0, 0.4);
    }

    .item:hover .desc {
      opacity: 1;
      bottom: -40px;
    }
  </style>
</head>

<body>
  <h1 class="title">一方有难、八方支援</h1>
  <div class="breath">
    <div class="item">
      <img src="imgs/blog0.jpg" alt="">
      <div class="desc">
        <i class="iconfont icon-like_fill icon"></i>
        <i>郑州加油</i>
        <i class="iconfont icon-like_fill icon"></i>
      </div>
    </div>
    <div class="item">
      <img src="imgs/blog1.jpg" alt="">
      <div class="desc">
        <i class="iconfont icon-like_fill icon"></i>
        <i>河南加油</i>
        <i class="iconfont icon-like_fill icon"></i>
      </div>
    </div>
    <div class="item">
      <img src="imgs/blog2.jpg" alt="">
      <div class="desc">
        <i class="iconfont icon-like_fill icon"></i>
        <i>郑州挺住</i>
        <i class="iconfont icon-like_fill icon"></i>
      </div>
    </div>
    <div class="item">
      <img src="imgs/blog3.jpg" alt="">
      <div class="desc">
        <i class="iconfont icon-like_fill icon"></i>
        <i>河南挺住</i>
        <i class="iconfont icon-like_fill icon"></i>
      </div>
    </div>
  </div>

</body>

</html>
