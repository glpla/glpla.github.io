<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cube</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    .wrap {
      width: 100vw;
      height: 100vh;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .cube {
      width: 200px;
      height: 200px;
      position: relative;
      transform-style: preserve-3d;
      transform-origin: center;
      animation: roll 20s infinite linear;
      transform: rotateX(-30deg) rotateY(-70deg);
    }

    @keyframes roll {
      0% {
        transform: rotateX(0deg) rotateY(0deg);
      }

      100% {
        transform: rotateX(360deg) rotateY(360deg);
      }
    }

    .cube>div {
      transition: 0.4s ease-in;
    }

    .cube .out-front,
    .cube .out-back,
    .cube .out-left,
    .cube .out-right,
    .cube .out-top,
    .cube .out-bottom {
      width: 100%;
      height: 100%;
      background: #f40;
      color: #fff;
      opacity: 0.6;
      position: absolute;
      top: 0px;
      left: 0px;
      text-align: center;
      font-size: 36px;
      line-height: 200px;
      transform-style: preserve-3d;
      transform-origin: center;
      border: 1px solid #fff;
    }

    .cube .out-front {
      transform: translateZ(100px);
    }

    .cube .out-back {
      transform: translateZ(-100px) rotateY(180deg);
    }

    .cube .out-left {
      transform: translateX(-100px) rotateY(-90deg);
    }

    .cube .out-right {
      transform: translateX(100px) rotateY(90deg);
    }

    .cube .out-top {
      transform: translateY(-100px) rotateX(90deg);
    }

    .cube .out-bottom {
      transform: translateY(100px) rotateX(-90deg);
    }

    .cube:hover .out-front {
      transform: translateZ(200px);
    }

    .cube:hover .out-back {
      transform: translateZ(-200px) rotateY(180deg);
    }

    .cube:hover .out-left {
      transform: translateX(-200px) rotateY(-90deg);
    }

    .cube:hover .out-right {
      transform: translateX(200px) rotateY(90deg);
    }

    .cube:hover .out-top {
      transform: translateY(-200px) rotateX(90deg);
    }

    .cube:hover .out-bottom {
      transform: translateY(200px) rotateX(-90deg);
    }

    .cube .inner-front,
    .cube .inner-back,
    .cube .inner-left,
    .cube .inner-right,
    .cube .inner-top,
    .cube .inner-bottom {
      width: 100px;
      height: 100px;
      object-fit: cover;
      position: absolute;
      top: 50px;
      left: 50px;
      transform-style: preserve-3d;
      transform-origin: center;
      border: 1px solid #f40;
    }

    .cube .inner-front {
      transform: translateZ(50px);
    }

    .cube .inner-back {
      transform: translateZ(-50px) rotateY(180deg);
    }

    .cube .inner-left {
      transform: translateX(-50px) rotateY(-90deg);
    }

    .cube .inner-right {
      transform: translateX(50px) rotateY(90deg);
    }

    .cube .inner-top {
      transform: translateY(-50px) rotateX(90deg);
    }

    .cube .inner-bottom {
      transform: translateY(50px) rotateX(-90deg);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="cube">
      <div class="out-front">front</div>
      <div class="out-back">back</div>
      <div class="out-left">left</div>
      <div class="out-right">right</div>
      <div class="out-top">top</div>
      <div class="out-bottom">bottom</div>
      <img src='imgs/lg.jpg' class='inner-front'></img>
      <img src='imgs/lg.jpg' class='inner-back'></img>
      <img src='imgs/lg.jpg' class='inner-left'></img>
      <img src='imgs/lg.jpg' class='inner-right'></img>
      <img src='imgs/lg.jpg' class='inner-top'></img>
      <img src='imgs/lg.jpg' class='inner-bottom'></img>
    </div>
  </div>
</body>

</html>
