<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>opening | 2021-2022</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="//at.alicdn.com/t/font_2357817_7mp7ai5x53p.css">
  <style>
    body {
      font-family: "montserrat", 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #fff;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .greeting,
    .tool,
    .score {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .greeting-cont {
      display: grid;
      grid-template-columns: repeat(3, 160px);
      grid-template-rows: repeat(3, 160px);
      gap: 1rem;
    }

    .item {
      width: 100%;
      height: 100%;
      perspective: 1000px;
    }

    .box {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      box-shadow: 0 0 .8rem #666;
      transform-style: preserve-3d;
      transition: 1s;
    }

    .img {
      width: 454px;
      height: 199px;
    }

    .icon,
    .tips {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      text-align: center;
      line-height: 160px;
      background-color: #ff7f50;
      color: #fff;
      border-radius: 1rem;
    }

    .icon {
      font-size: 60px;
    }

    .tips {
      text-transform: capitalize;
      transform: rotateY(180deg);
      font-size: 20px;
      user-select: none;
    }

    .tips::first-letter {
      color: #ff0;
      font-size: 1.2em;
    }

    .item:hover .box {
      transform: rotateY(180deg);
    }

    .link {
      position: absolute;
      bottom: 4rem;
      right: 4rem;
      width: 60px;
      height: 60px;
      transition: 2s;
    }

    .arrow {
      width: 100%;
      height: 100%;
      font-size: 60px;
      color: #ff7f50;
      text-shadow: 0 0 1rem #ff7f50;
    }

    .link:hover {
      transform: rotate(360deg);
    }

    /* page2 */
    .cont {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .cont p {
      font-size: 2rem;
    }

    /* page3 */
    .tool-cont {
      display: grid;
      grid-template-columns: repeat(3, 160px);
      grid-template-rows: repeat(3, 160px);
      gap: 1rem;
    }

    .tool-cont img:nth-child(4) {
      grid-column: span 3;
    }

    .tool-cont img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* page4 */
    .score-cont {
      display: flex;
      font-size: 20px;
    }

    .score-cont div {
      height: 60px;
      line-height: 60px;
      color: #fff;
      padding-left: 1rem;
      box-shadow: 0 0 1rem #6666, 0 0 2rem #0008;
    }

    .score-cont div:nth-child(1) {
      width: 100px;
      background-color: #05c46b;
      border-top-left-radius: 30px;
      border-bottom-left-radius: 30px;
    }

    .score-cont div:nth-child(2) {
      width: 100px;
      background-color: #ffa801;
    }

    .score-cont div:nth-child(3) {
      width: 800px;
      background-color: #c0392b;
      border-top-right-radius: 30px;
      border-bottom-right-radius: 30px;
    }
  </style>
</head>

<body>
  <div class="wrap greeting" id='greeting'>
    <div class="greeting-cont">
      <div class="item">
        <div class="box">
          <p class="tips">laptop</p>
          <span class="iconfont iconlaptop icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">patience</p>
          <span class="iconfont iconicon-test icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">reading</p>
          <span class="iconfont iconbook icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">coding</p>
          <span class="iconfont iconcode icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">collecting</p>
          <span class="iconfont iconheart icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">communicating</p>
          <span class="iconfont iconmessage-square icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">searching</p>
          <span class="iconfont iconsearch2 icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">third-party</p>
          <span class="iconfont icondisanfang icon"></span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">framework</p>
          <span class="iconfont iconkuangjiaguanli2 icon"></span>
        </div>
      </div>
    </div>
    <a class="link" href="#content"><i class="iconfont iconArrowdown arrow"></i></a>
  </div>
  <div class="wrap cont" id='content'>
    <p>HTML5</p>
    <p>CSS3</p>
    <p>JavaScript</p>
    <img class="img" src="./imgs/HTML.jpg" alt="">
    <p>基本概念</p>
    <p>基本理论</p>
    <p>基本应用</p>
    <a class="link" href="#tool"><i class="iconfont iconArrowdown arrow"></i></a>
  </div>
  <div class="wrap tool" id='tool'>
    <div class="tool-cont">
      <img class="item" src="./imgs/chrome.jpg" alt="">
      <img class="item" src="./imgs/git.jpg" alt="">
      <img class="item" src="./imgs/GitHub.jpg" alt="">
      <img class="item" src="./imgs/vs.jpg" alt="">
      <img class="item" src="./imgs/ktp.jpg" alt="">
      <img class="item" src="./imgs/chrome.jpg" alt="">
      <img class="item" src="./imgs/chrome.jpg" alt="">
    </div>
    <a class="link" href="#score"><i class="iconfont iconArrowdown arrow"></i></a>
  </div>
  <div class="wrap score" id="score">
    <div class="score-cont">
      <div>考勤10</div>
      <div>作业10</div>
      <div>大作业80</div>
    </div>
    <a class="link" href="#greeting"><i class="iconfont iconArrowup arrow"></i></a>
  </div>
  <script src="//unpkg.com/scrollreveal"></script>
  <script>
    window.onload = function () {
      ScrollReveal().reveal('.item', {
        delay: 0,
        distance: "50px",
        duration: 500,
        easing: "ease-in-out",
        reset: true,
        interval: 250,
        opacity: 0,
        origin: 'bottom',
        rotate: {
          x: 10,
          y: 20,
          z: 30,
        },
      });
      ScrollReveal().reveal('.score-cont div', {
        delay: 0,
        distance: "50px",
        duration: 500,
        easing: "ease-in-out",
        reset: true,
        interval: 250,
        opacity: 0,
        origin: 'left'
      });
    }
  </script>
</body>

</html>
