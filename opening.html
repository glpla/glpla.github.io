<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening | 2021-2022</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/opening.css">
  <script src="./js/scrollreveal.min.js"></script>
</head>

<body>
  <div class="flex-h wrap" id='greeting'>
    <div class="greeting">
      <div class="item">
        <div class="box">
          <p class="tips">笔记本</p>
          <span class="iconfont icon">&#xe8ff;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">耐心</p>
          <span class="iconfont icon">&#xe604;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">博览</p>
          <span class="iconfont icon">&#xe728;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">撸码</p>
          <span class="iconfont icon">&#xe72d;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">收藏</p>
          <span class="iconfont icon">&#xe738;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">交流</p>
          <span class="iconfont icon">&#xe73e;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">检索</p>
          <span class="iconfont icon">&#xe747;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">第三方</p>
          <span class="iconfont icon">&#xe826;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">框架</p>
          <span class="iconfont icon">&#xe687;</span>
        </div>
      </div>
    </div>
    <a class="link" href="#content"><i class="iconfont arrow">&#xe6be;</i></a>
  </div>
  <div class="flex-h wrap" id='content'>
    <div class="flex-v">
      <p>HTML5</p>
      <p>CSS3</p>
      <p>JavaScript</p>
      <img class="img" src="./imgs/HTML.jpg" alt="">
      <p>基本概念</p>
      <p>基本理论</p>
      <p>基本应用</p>
    </div>
    <a class="link" href="#tool"><i class="iconfont arrow">&#xe6be;</i></a>
  </div>
  <div class="flex-h wrap" id='tool'>
    <div class="greeting">
      <img class="item" src="./imgs/chrome.jpg" alt="">
      <img class="item" src="./imgs/git.jpg" alt="">
      <img class="item" src="./imgs/GitHub.jpg" alt="">
      <img class="item" src="./imgs/vs.jpg" alt="">
      <img class="item" src="./imgs/ktp.jpg" alt="">
      <img class="item" src="./imgs/third.png" alt="">
      <img class="item" src="./imgs/chrome.jpg" alt="">
    </div>
    <a class="link" href="#score"><i class="iconfont arrow">&#xe6be;</i></a>
  </div>
  <div class="flex-h wrap" id="score">
    <div class="score">
      <div class="flex-h score-item item1">
        <div class="effect" style="--per:0.1"></div>
        <div>考勤10分</div>
      </div>
      <div class="flex-h score-item item2">
        <div class="effect" style="--per:0.1"></div>
        <div>作业10分</div>
      </div>
      <div class="flex-h score-item item3">
        <div class="effect" style="--per:0.2"></div>
        <div>大作业20分</div>
      </div>
      <div class="flex-h score-item item4">
        <div class="effect" style="--per:0.6"></div>
        <div>考核60分</div>
      </div>
    </div>
    <a class="link" href="#greeting"><i class="iconfont arrow">&#xe6c0;</i></a>
  </div>
  <script>
    window.onload = function () {
      ScrollReveal().reveal('.item', {
        delay: 0,
        distance: "50px",
        duration: 500,
        easing: "ease-in-out",
        reset: true,
        interval: 250,
        opacity: 0,
        origin: 'bottom',
        rotate: {
          x: 10,
          y: 20,
          z: 30,
        },
      });
      ScrollReveal().reveal('.effect', {
        origin: 'left',
        delay: 0,
        distance: "1px",
        duration: 500,
        easing: "ease-in-out",
        reset: true,
        interval: 250,
        opacity: 0,
        scale: .5
      });
    }
  </script>
</body>

</html>
