<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening | 2021-2022</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/opening.css">
  <script src="./js/scrollreveal.min.js"></script>
</head>

<body>
  <div class="flex-h wrap" id='greeting'>
    <div class="greeting">
      <div class="item">
        <div class="box">
          <p class="tips">笔记本</p>
          <span class="iconfont icon">&#xe7fc;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">耐心</p>
          <span class="iconfont icon">&#xe7f7;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">博览</p>
          <span class="iconfont icon">&#xe7e2;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">撸码</p>
          <span class="iconfont icon">&#xe7f2;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">收藏</p>
          <span class="iconfont icon">&#xe80c;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">交流</p>
          <span class="iconfont icon">&#xe7f8;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">检索</p>
          <span class="iconfont icon">&#xe831;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">第三方</p>
          <span class="iconfont icon">&#xe830;</span>
        </div>
      </div>
      <div class="item">
        <div class="box">
          <p class="tips">框架</p>
          <span class="iconfont icon">&#xe822;</span>
        </div>
      </div>
    </div>
    <a class="link" href="#content"><i class="iconfont arrow">&#xe6be;</i></a>
  </div>
  <div class="flex-h wrap" id='content'>
    <div class="flex-v">
      <p>HTML5</p>
      <p>CSS3</p>
      <p>JavaScript</p>
      <img class="img" src="./imgs/HTML.jpg" alt="">
      <p>基本概念</p>
      <p>基本理论</p>
      <p>基本应用</p>
    </div>
    <a class="link" href="#tool"><i class="iconfont arrow">&#xe6be;</i></a>
  </div>
  <div class="flex-h wrap" id='tool'>
    <div class="greeting">
      <img class="item" src="./imgs/vs.jpg" title="IDE">
      <img class="item" src="./imgs/vue.jpg" title="前端框架">
      <img class="item" src="./imgs/vite.jpg" title="打包工具">
      <img class="item" src="./imgs/ktp.jpg" title="教学管理">
      <img class="item" src="./imgs/chrome.jpg" title="谷歌浏览器">
      <img class="item" src="./imgs/git.jpg" title="代码仓库管理">
      <img class="item" src="./imgs/GitHub.jpg" title="代码仓库">
    </div>
    <a class="link" href="#score"><i class="iconfont arrow">&#xe6be;</i></a>
  </div>
  <div class="flex-h wrap" id="score">
    <div class="score">
      <div class="flex-h score-item item1">
        <div class="effect" style="--per:0.1"></div>
        <div>考勤10分</div>
      </div>
      <div class="flex-h score-item item2">
        <div class="effect" style="--per:0.3"></div>
        <div>作业30分</div>
      </div>
      <div class="flex-h score-item item3">
        <div class="effect" style="--per:0.6"></div>
        <div>考核60分</div>
      </div>
      <!-- <div><meter min="0" max="100" value="10"></meter>考勤10分</div>
      <div><meter value="0.1"></meter>作业10分</div>
      <div><meter min="0" max="100" value="20"></meter>大作业20分</div>
      <div><meter value="0.6"></meter>考核60分</div>
      <div><progress max='100' value="10">10</progress></div>
      <div><progress max='100' value="10">10</progress></div>
      <div><progress max='100' value="20">20</progress></div>
      <div><progress max='100' value="60">60</progress></div> -->
    </div>
    <a class="link" href="#greeting"><i class="iconfont arrow">&#xe6c0;</i></a>
  </div>
  <script>
    window.onload = function () {
      ScrollReveal().reveal('.item', {
        delay: 0,
        distance: "50px",
        duration: 500,
        easing: "ease-in-out",
        reset: true,
        interval: 250,
        opacity: 0,
        origin: 'bottom',
        rotate: {
          x: 10,
          y: 20,
          z: 30,
        },
      });
      ScrollReveal().reveal('.effect', {
        origin: 'left',
        delay: 0,
        distance: "1px",
        duration: 500,
        easing: "ease-in-out",
        reset: true,
        interval: 250,
        opacity: 0,
        scale: .5
      });
    }
  </script>
</body>

</html>
