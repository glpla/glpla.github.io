<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
    }

    .dice {
      width: 136px;
      height: 136px;
      border-radius: 10px;
      background-image: url(imgs/dice.png);
      background-position: -20% 100%;
      animation: roll .4s steps(6, start) infinite;
    }

    @keyframes roll {
      to {
        background-position: 100% 100%;
      }
    }

    input {
      display: none;
    }

    label {
      cursor: pointer;
    }

    input[type='checkbox']:checked+label .dice {
      animation-play-state: paused;
    }
  </style>
</head>

<body>
  <input type="checkbox" name="" id="dice">
  <label for="dice">
    <div class="dice"></div>
  </label>
</body>

</html>
