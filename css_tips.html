<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Css Tips</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
</head>

<body>
  <div class="w">
    <h4 class="cont-title">平滑滚动</h4>
    <pre class="code">
  html {
    scroll-behavior: smooth;
  }  </pre>
    <h4 class="cont-title">自定义鼠标</h4>
    <pre class="code">
  body {
    cursor: url(../imgs/cursor.png), auto;
  }  
  a{
    cursor: url(../imgs/cursor_over.png), auto;
  }</pre>
    <h4 class="cont-title">input输入符号颜色</h4>
    <pre class="code">
  input {
    caret-color: #f40;
  }  </pre>
  </div>
</body>

</html>
