<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    ul {
      list-style: none;
    }

    li {
      margin: 0 1rem;
    }

    ul li {
      color: #333;
    }

    .nav {
      display: flex;
    }

    .nav>li {
      /* font-size: 1.2rem;
      font-weight: 700; */
      color: #f40;
    }

    .item1~li {
      color: #078;
    }

    .item3+.item4 {
      color: #ff0;
    }

    .sub-nav li:nth-child(2) {
      text-decoration: underline;
    }

    .sub-nav>li:hover {
      text-shadow: 0 0 .4rem #f40;
    }
  </style>
</head>

<body>

  <ul class="nav">
    <li class="item logo">logo</li>
    <li class="item item1">home</li>
    <li class="item item2">introdution</li>
    <li class="item item3">
      download
      <ul class="sub-nav">
        <li class="nest">html</li>
        <li class="nest">css</li>
        <li class="nest">javascript</li>
      </ul>
    </li>
    <li class="item item4">contact</li>
  </ul>
</body>

</html>
