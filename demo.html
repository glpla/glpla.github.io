<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Baidu Map </title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
    }

    .container {
      height: 100vh;
      overflow: scroll;
      scroll-snap-type: mandatory;
    }

    section {
      height: 100vh;
      scroll-snap-type: y mandatory;
    }

    .container section:nth-child(odd) {
      background-color: #f40;
    }

    .test {
      width: 50vw;
      margin: 0 auto;
      height: 10vh;
      border: 100px solid;
      border-image-source: url(./imgs/bg.jpg);
      border-image-slice: 1;
    }
  </style>
</head>

<body>
  <div class="test"></div>

  <div class="container">
    <section>1</section>
    <section>2</section>
    <section>3</section>
    <section>4</section>
  </div>

  <script>

  </script>
</body>

</html>
