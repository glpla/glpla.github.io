<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Baidu Map </title>
  <link rel="stylesheet" href="css/reset.css">
  <style type="text/css">
    table {
      width: 90%;
      margin: 0 auto;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #666;
      text-align: center;
    }

    header {
      text-align: center;
    }

    .week {
      margin: 0 1rem;
    }
  </style>
</head>

<body>
  <section id="app" class="w">
    <h1>教学日历</h1>
    <header>
      <span class="week" v-for='item in weeks' :key='item'>{{item}}</span>
      <div>
        <span v-for='item in days'>{{item.yy}}-{{item.mm}}-{{item.i}}&nbsp;</span>
      </div>
    </header>
  </section>
  <script src="./js/vue.global.prod.min.js"></script>
  <script src="./js/moment.js"></script>
  <script type="module">
    const app = Vue.createApp({
      data() {
        return {
          weeks: ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日'],
          ind: 0,
          days: []
        }
      },
      methods: {

      },
      computed: {},
      watch: {},
      created() {
        let date = new Date('2021-09-06')
        let year = date.getFullYear()
        let mon = date.getMonth() + 1
        moment.locale();
        for (let i = mon; i < mon + 5; i++) {
          let nDate = new Date(year, i, 0)
          let yy = nDate.getFullYear()
          let mm = nDate.getMonth() + 1
          let dd = nDate.getDate()
          for (let i = 1; i <= dd; i++) {
            console.log(yy, mm, i);
            this.days.push({ yy, mm, i })
          }
        }
      },
      mounted() {
        window.addEventListener('scroll', (e) => {
          if (window.pageYOffset > window.innerHeight) {
            this.showBool = true
          } else {
            this.showBool = false
          }
        })
      },
    })
    const vm = app.mount('#app')
  </script>
</body>

</html>
