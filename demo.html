<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Baidu Map </title>
  <style type="text/css">
    html {
      height: 100%
    }

    body {
      height: 100%;
      margin: 0px;
      padding: 0px
    }

    #container {
      width: 50vw;
      height: 50vh;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div id="container"></div>
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=5errU4jPPqKuC4LmMhinjlDYFrvz3mvn"></script>
  <script>
    let map = new BMap.Map("container", {
      coordsType: 5
    });
    let point = new BMap.Point(110.284788, 25.101197);
    map.centerAndZoom(point, 15);
    map.enableScrollWheelZoom(true);
  </script>
</body>

</html>
