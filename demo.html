<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="css/reset.css">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.0.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    .menu-box {
      max-width: 120px;
      margin: 0 auto;
    }

    ol>li {
      max-width: 120px;
      line-height: 2;
      background-color: #f40;
      color: #fff;
      margin: 1px 0;
      padding-left: 1rem;
      cursor: pointer;
      transition: .4s;
    }

    ol>li:hover {
      color: #f40;
      background-color: #fff;
    }

    .more {}
  </style>
</head>

<body>
  <div class="menu-box">
    <ol class="menu">
      <li>1</li>
      <li>2</li>
      <li>3</li>
    </ol>
    <span>more</span>
    <ol class="more" start="4">
      <li>4</li>
      <li>5</li>
      <li>6</li>
      <li>7</li>
      <li>8</li>
      <li>9</li>
      <li>10</li>
    </ol>
  </div>

</body>

</html>
