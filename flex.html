<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>flex</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/flex.css">
</head>

<body>
  <div class="w">
    <h1>知识点</h1>
    <dl class="keypoint">
      <dt>flex盒子属性</dt>
      <dd>flex-direction</dd>
      <dd>justify-content</dd>
      <dd>align-items</dd>
      <dd>flex-wrap</dd>
    </dl>
    <dl class="keypoint">
      <dt>flex项属性</dt>
      <dd>flex-grow</dd>
      <dd>flex-shrink</dd>
      <dd>flex-basis</dd>
      <dd>复合属性flex:flex-grow flex-shrink flex-basis</dd>
      <dd>简写属性flex</dd>
    </dl>
    <div class="exam-title">水平垂直居中</div>
    <div class="flex center">点击进入</div>
    <div class="exam-title">左右导航布局</div>
    <div class="flex">
      <div class="left">固定大小</div>
      <div class="right">自适应大小</div>
    </div>
    <div class="exam-title">圣杯布局</div>
    <div class="flex">
      <div class="cup-left">固定大小</div>
      <div class="cup-middle">自适应大小</div>
      <div class="cup-right">固定大小</div>
    </div>
    <div class="exam-title">等分布局</div>
    <div class="flex">
      <div class="eq">三等分flex:1;</div>
      <div class="eq">三等分flex:1;</div>
      <div class="eq">三等分flex:1;</div>
    </div>
    <div class="exam-title">不等分布局</div>
    <div class="flex">
      <div class="eq-1">1/4份flex:1;</div>
      <div class="eq-2">2/4份flex:2;</div>
      <div class="eq-1">1/4份flex:1;</div>
    </div>
  </div>
</body>
