<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Flip | Cnplaman</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="//at.alicdn.com/t/font_2357817_g9r1516fbe5.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: url(imgs/cover.jpg) no-repeat;
      background-size: cover;
    }

    .card-box {
      position: relative;
      width: 500px;
      height: 280px;
      transform-style: preserve-3d;
      perspective: 800px;
    }

    .card-box>div {
      box-sizing: border-box;
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      color: #fff;
      border: 2px solid #fff8;
      text-transform: uppercase;
      backface-visibility: hidden;
      transition: .6s;
    }

    .card-f {
      background: #2c3e5088;
      text-align: center;
      line-height: 240px;
      font-size: 28px;
    }

    .card-b {
      line-height: 2;
      background: #27ae60;
      transform: rotateX(180deg);
    }

    .card-b i {
      line-height: 2;
      font-size: 16px;
      padding-right: 20px;
    }

    .card-box:hover .card-f {
      transform: rotateX(180deg);
    }

    .card-box:hover .card-b {
      transform: rotateX(360deg);
    }

    .card-b .user {
      position: absolute;
      right: 10px;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card-b .user i {
      font-size: 56px;
    }
  </style>
</head>

<body>
  <div class="card-box">
    <div class="card-f">hover for more</div>
    <div class="card-b">
      <div class="card user">
        <i class="iconfont iconuser"></i>
        <span>Cnplaman</span>
      </div>
      <div class="card">
        <i class="iconfont iconphone"></i>
        <span>+86 137 0773 5481</span>
      </div>
      <div class="card">
        <i class="iconfont iconmail"></i>
        <span>1942194789@qq.com</span>
      </div>
      <div class="card">
        <i class="iconfont iconsmart-home"></i>
        <span>Room 2114</span>
      </div>
    </div>
  </div>
</body>

</html>
