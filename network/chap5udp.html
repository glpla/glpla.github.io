            <dt>UDP特点-User Datagram Protocol</dt>
            <dd>1.无连接；最大努力交付best effort delivery；无需确认；</dd>
            <dd>2.面向报文，不拆分；不重装；</dd>
            <dd>3.没有流量控制、没有拥塞控制；</dd>
            <dd>4.首部开销小，8个字节</dd>
            <dd>5.支持组播、多播；用用于实时通信；</dd>
            <dd>6.更多信息，请参考<a class="warn" href="https://www.rfc-editor.org/rfc/rfc768" target="_blank">RFC 768</a></dd>
