<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eChart</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <script src="js/echarts.min.js"></script>
  <style>
    .echart {
      /* width: 640px; */
      height: 360px;
    }
  </style>
</head>

<body>
  <div id="echarts" class="echart"></div>
  <script>
    let myChart = echarts.init(document.getElementById('echarts'));
    let option = {
      title: {
        text: 'ECharts 入门示例',
        subtext: 'just for demo',
        textAlign: 'center'
      },
      tooltip: {
        show: true,// default
        backgroundColor: '#fff',
        textStyle: {
          color: '#f40'
        }
      },
      legend: {
        data: ['销量']
      },
      xAxis: {
        show: true,
        data: ["衬衫", "羊毛衫", "雪纺衫", "裤子", "高跟鞋", "袜子"]
      },
      yAxis: {},
      series: [{
        name: '销量',
        type: 'bar',
        data: [5, 20, 36, 10, 10, 20],
        showBackground: true,
        backgroundStyle: {
          color: '#8888',
          borderColor: '#888',
          borderWidth: '1'
        },
        itemStyle: {
          color: '#098'
        },
        emphasis: {
          focus: 'self'
        }
      }],
      backgroundColor: '#8888',
      textStyle: {
        color: '#888',
        fontSize: '24'
      }
    };
    myChart.setOption(option);
  </script>
</body>

</html>
