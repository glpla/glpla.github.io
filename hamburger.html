<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hamburger</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="//at.alicdn.com/t/font_2357817_qvrcg7g39o.css">
    <style>
        nav {
            box-sizing: border-box;
            position: relative;
            width: 800px;
            padding: 0 1rem;
            margin: 0 auto;
            height: 50px;
            line-height: 50px;
            text-transform: uppercase;
            background-color: #f2f3f4;
            font-size: 1rem;
        }

        nav i {
            font-size: 1rem;
        }

        .label,
        .ipt {
            display: none;
            color: #fff;
        }

        .menu-box {
            display: flex;
        }

        li {
            margin: 0 4px;
        }

        .menu-box li:first-child {
            margin-right: auto;
        }

        a:hover {
            color: #f40;
        }

        @media (max-width:768px) {
            html {
                font-size: 14px;
            }

            nav {
                width: 100vw;
                text-align: right;
                height: 30px;
                line-height: 30px;
                background-color: tomato;
            }

            .menu-box {
                display: none;
                position: absolute;
                left: 0;
                top: 30px;
            }

            .menu-box li:first-child {
                display: none;
            }


            .label {
                display: unset;
            }

            .ipt:checked+.menu-box {
                display: unset;
            }
        }
    </style>
</head>

<body>
    <nav>
        <label class="label" for="ham"><i class="iconfont iconmenu"></i></label>
        <input class="ipt" type="checkbox" name="" id="ham">
        <ul class="menu-box">
            <li><a href="javascript:;">logo</a></li>
            <li><a href="javascript:;">nav1</a></li>
            <li><a href="javascript:;">nav2</a></li>
            <li><a href="javascript:;">nav3</a></li>
            <li><a href="javascript:;">nav4</a></li>
        </ul>
    </nav>
    <footer>Copyright Reserved &copy; By Cnplaman 2021-10-06</footer>
</body>

</html>
