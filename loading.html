<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loading</title>
  <style>
    .wrap {
      width: 10rem;
      height: 10rem;
      margin: 4rem auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      position: relative;
      width: 80%;
      height: 80%;
    }

    .box div {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      transform: rotate(calc(var(--x)*20deg));
    }

    .box div::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background-color: #f40;
      box-shadow:
        0 0 10px #ff0,
        0 0 20px #f40;
      transform: scale(0);
      filter: hue-rotate(0);
      animation: flash 1.44s linear infinite;
      animation-delay: calc(var(--x)*.08s);
    }

    @keyframes flash {
      100% {
        transform: scale(1);
        filter: hue-rotate(360deg);
      }
    }

    .circle {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border-top: .4rem solid #228b22;
      box-shadow: 0 0 .4rem #000;
      animation: r1 2s linear infinite;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle::before,
    .circle::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0px;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 .4rem #000;
    }

    .circle::before {
      border-top: .4rem solid #1e90ff;
      transform: rotate(120deg);
    }

    .circle::after {
      border-top: .4rem solid #ff8c00;
      transform: rotate(240deg);
    }

    .text {
      font-size: 1.2rem;
      animation: r2 2s linear infinite;
    }

    @keyframes r1 {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes r2 {
      to {
        transform: rotate(-360deg);
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class='circle'>
      <div class='text'>点击进入</div>
    </div>
  </div>
  <div class="wrap">
    <div class="box">
      <div style="--x:0"></div>
      <div style="--x:1"></div>
      <div style="--x:2"></div>
      <div style="--x:3"></div>
      <div style="--x:4"></div>
      <div style="--x:5"></div>
      <div style="--x:6"></div>
      <div style="--x:7"></div>
      <div style="--x:8"></div>
      <div style="--x:9"></div>
      <div style="--x:10"></div>
      <div style="--x:11"></div>
      <div style="--x:12"></div>
      <div style="--x:13"></div>
      <div style="--x:14"></div>
      <div style="--x:15"></div>
      <div style="--x:16"></div>
      <div style="--x:17"></div>
    </div>
  </div>
</body>

</html>
