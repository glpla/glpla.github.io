<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sprite</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/reset.css">
  <style>
    h1 {
      text-align: center;
      font-size: 1.2rem;
    }

    .img-box div {
      position: relative;
      transition: .4s;
    }

    .img-box div:hover {
      top: -1rem;
    }

    .box2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      width: 640px;
      height: 400px;
      margin: 20px auto;
      background-color: lightcoral;
    }

    .box2 .img0 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 0% 0;

    }

    .box2 .img1 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 100% 0;
    }

    .box3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 640px;
      height: 400px;
      margin: 20px auto;
      background-color: lightcoral;
    }

    .box3 .img0 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 0 0;
    }

    .box3 .img1 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 50% 0;
    }

    .box3 .img2 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 100% 0;
    }

    .box4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: 640px;
      height: 400px;
      margin: 20px auto;
      background-color: lightcoral;
    }

    .box4 .img0 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 0 0;
    }

    .box4 .img1 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: calc(100%/3) 0;
    }

    .box4 .img2 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: calc(100%*2/3) 0;
    }

    .box4 .img3 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: calc(100%*3/3) 0;
    }

    .box5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      width: 640px;
      height: 400px;
      margin: 20px auto;
      background-color: lightcoral;
    }

    .box5 .img0 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 0 0;
    }

    .box5 .img1 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 25% 0;
    }

    .box5 .img2 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 50% 0;
    }

    .box5 .img3 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 75% 0;
    }

    .box5 .img4 {
      width: 100%;
      height: 100%;
      background-image: url(./imgs/1.jpg);
      background-repeat: no-repeat;
      background-position: 100% 0;
    }
  </style>
</head>

<body>
  <h1>2片</h1>
  <div class="box2 img-box">
    <div class="img0"></div>
    <div class="img1"></div>
  </div>
  <h1>3片</h1>
  <div class="box3 img-box">
    <div class="img0"></div>
    <div class="img1"></div>
    <div class="img2"></div>
  </div>
  <h1>4片</h1>
  <div class="box4 img-box">
    <div class="img0"></div>
    <div class="img1"></div>
    <div class="img2"></div>
    <div class="img3"></div>
  </div>
  <h1>5片</h1>
  <div class="box5 img-box">
    <div class="img0"></div>
    <div class="img1"></div>
    <div class="img2"></div>
    <div class="img3"></div>
    <div class="img4"></div>
  </div>
</body>

</html>
